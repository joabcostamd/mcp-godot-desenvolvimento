<svg xmlns="http://www.w3.org/2000/svg" width="240" height="40" viewBox="0 0 240 40">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#478cbf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#355c7d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="240" height="40" rx="6" fill="url(#bg)" />
  <!-- Icon area -->
  <rect width="40" height="40" rx="6" fill="#2d4a6b" />
  <!-- Godot icon (simplified gear/cog) -->
  <circle cx="20" cy="20" r="8" fill="none" stroke="#6bb3e0" stroke-width="2.5"/>
  <circle cx="20" cy="20" r="3" fill="#6bb3e0"/>
  <!-- Text -->
  <text x="48" y="16" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#b8d4e8" font-weight="bold">MADE WITH</text>
  <text x="48" y="31" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">MCP Godot Agent</text>
</svg>
