name: CI — MCP Godot Agent

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/test_gate_reorg.py -v
      - run: python -c "import server; assert len(server._tool_defs()) > 0"
      - run: python auditar.py --fatia CI
